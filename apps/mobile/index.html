
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Apla Agri Mart</title>
    
    <meta name="theme-color" content="#0E1A0E">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" sizes="192x192" href="https://img.icons8.com/color/192/farm.png">
    <link rel="manifest" href="/manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --earth-green: #2D5A27;
            --deep-soil: #0E1A0E;
            --harvest-gold: #F59E0B;
            --md-surface: #1A2E1A;
        }
        body {
            font-family: 'Lexend', 'Roboto', sans-serif;
            background: var(--deep-soil);
            color: #E8F0E8;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: rgba(245, 158, 11, 0.1);
            user-select: none;
        }

        .blob {
            position: fixed;
            width: 100vw;
            height: 100vw;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.15;
            animation: drift 30s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .blob-1 { background: var(--earth-green); top: -20%; left: -20%; }
        .blob-2 { background: var(--harvest-gold); bottom: -20%; right: -20%; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(5%, 10%) scale(1.1); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0"
  }
}
</script>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div id="root"></div>
    
    <script type="module" src="/index.tsx"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registered!', reg);
                }).catch(err => {
                    console.log('SW registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
